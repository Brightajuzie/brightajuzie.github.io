<!DOCTYPE html>
<html lang="en">
  <head>
     
    <link rel ="stylesheet" href="styles/rafting.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <meta name="description" content="Rafting">
    <meta name="author" content="Bright Chidozie Onyekachi">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kach Rafts Contact</title>
  </head>
  <body>
    <header>
        
        <img src="images/Rapids_logo.jpg" alt="Rapids_logo">
      <nav>
        <a href="#">Home</a>
        <a href="#">About Us</a>
        <a href="#">What we do</a>
        <a href="#">Contact</a>
      </nav>
    </header>
        <main>
            <div class="wrapper">
                <h1>Kach Rafts Contact</h1>
                <form>
                    <fieldset>
                        <legend>Contact Information</legend>
                        <label for="fullname">Full Name:</label>
                        <input type="text" id="fullname" name="fullname">
                        <label for="useremail">Email:</label>
                        <input type="email" id="useremail" name="useremail">
                        <label for="textarea">Contact:</label>
                        <textarea placeholder="Type a message here" cols="36" rows="2" id="contact" name="contact"> </textarea>
                    </fieldset>
                    <button type="submit">Contact Us</button>
                </form>
            </div>
        </main>
    <footer>
         
            <p>©️2024 Kachlinks</p>
              
    <nav class="sociallinks">
    <a href="https://facebook.com">
        <img src="images/facebook.jfif" alt="Facebook">
    </a>
    <a href="https://twitter.com">
        <img src="images/twitter.png" alt="Twitter">
    </a>
    <a href="https://instagram.com">
        <img src="images/instagram.jfif" alt="Instagram">
    </a>
    </nav>
        </footer>
